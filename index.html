<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Calculateur d'aire de triangle</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;max-width:900px;margin:20px auto;padding:0 14px;line-height:1.35}
    .card{border:1px solid #ddd;border-radius:10px;padding:14px;margin:12px 0}
    label{display:inline-block;min-width:170px;margin:6px 0}
    input,select,button{padding:8px;border-radius:8px;border:1px solid #bbb}
    input{width:140px}
    button{cursor:pointer}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .muted{color:#555;font-size:0.95em}
    .error{color:#b00020;font-weight:600}
    .ok{color:#0a7a0a;font-weight:600}
    pre{background:#f6f6f6;border:1px solid #e6e6e6;border-radius:10px;padding:10px;overflow:auto}
    canvas{border:1px solid #ddd;border-radius:10px;max-width:100%}
    .small{font-size:0.95em}
  </style>
</head>
<body>

<h2>Calculateur d'aire de triangle</h2>

<div class="card">
  <div class="row">
    <div>
      <label for="type">Type de triangle :</label>
      <select id="type">
        <option value="base">Base et hauteur</option>
        <option value="rectangle">Triangle rectangle (avec Pythagore)</option>
        <option value="heron">Trois côtés (formule de Héron)</option>
      </select>
    </div>
    <div class="muted small">
      Objectif : calculer l'aire + expliquer la formule et les étapes.
    </div>
  </div>

  <div id="inputs" style="margin-top:10px;"></div>

  <div class="row" style="margin-top:10px;">
    <button id="btnCalc">Calculer</button>
    <button id="btnReset" type="button">Réinitialiser</button>
  </div>

  <p id="message" style="margin-top:10px;"></p>
</div>

<div class="card">
  <h3>Résultat</h3>
  <p id="resultat" class="ok"></p>

  <h3>Explication</h3>
  <p id="explication"></p>

  <h3>Détail du calcul</h3>
  <pre id="detail"></pre>
</div>

<div class="card">
  <h3>Schéma (indicatif)</h3>
  <p class="muted small">
    Le dessin est une représentation proportionnelle si possible, sinon une représentation normalisée.
  </p>
  <canvas id="canvas" width="600" height="360"></canvas>
</div>

<script>
  const inputsDiv = document.getElementById("inputs");
  const typeSelect = document.getElementById("type");
  const btnCalc = document.getElementById("btnCalc");
  const btnReset = document.getElementById("btnReset");

  const messageEl = document.getElementById("message");
  const resultatEl = document.getElementById("resultat");
  const explicationEl = document.getElementById("explication");
  const detailEl = document.getElementById("detail");

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  function setMessage(text, kind){
    messageEl.className = kind === "error" ? "error" : (kind === "ok" ? "ok" : "muted");
    messageEl.textContent = text || "";
  }

  function resetOutputs(){
    setMessage("", "muted");
    resultatEl.textContent = "";
    explicationEl.textContent = "";
    detailEl.textContent = "";
    drawPlaceholder();
  }

  function drawPlaceholder(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = "16px system-ui, Arial";
    ctx.fillText("Sélectionne un type et calcule pour afficher un schéma.", 18, 28);
  }

  function isFinitePositive(x){
    return Number.isFinite(x) && x > 0;
  }

  function parseInput(id){
    const el = document.getElementById(id);
    if(!el) return NaN;
    const v = el.value.trim().replace(",", ".");
    if(v === "") return NaN;
    return Number(v);
  }

  function triangleInequality(a,b,c){
    return a + b > c && a + c > b && b + c > a;
  }

  function almostEqual(x, y, eps = 1e-9){
    return Math.abs(x - y) <= eps;
  }

  function afficherInputs(){
    resetOutputs();

    const type = typeSelect.value;

    if(type === "base"){
      inputsDiv.innerHTML = `
        <div class="row">
          <div><label>Base :</label><input id="base" inputmode="decimal" placeholder="ex : 8"></div>
          <div><label>Hauteur :</label><input id="hauteur" inputmode="decimal" placeholder="ex : 5"></div>
        </div>
        <p class="muted small">Formule : Aire = (base × hauteur) / 2.</p>
      `;
    }

    if(type === "rectangle"){
      inputsDiv.innerHTML = `
        <p class="muted small">
          Tu peux saisir soit :
          (1) les deux côtés perpendiculaires (cathètes) a et b, soit
          (2) une cathète et l'hypoténuse c (Pythagore calcule la cathète manquante), soit
          (3) les trois côtés (vérification triangle rectangle).
        </p>
        <div class="row">
          <div><label>Cathète a :</label><input id="ra" inputmode="decimal" placeholder="ex : 3"></div>
          <div><label>Cathète b :</label><input id="rb" inputmode="decimal" placeholder="ex : 4"></div>
          <div><label>Hypoténuse c :</label><input id="rc" inputmode="decimal" placeholder="ex : 5"></div>
        </div>
        <p class="muted small">
          Pythagore : a² + b² = c². Aire (triangle rectangle) : Aire = (a × b) / 2.
        </p>
      `;
    }

    if(type === "heron"){
      inputsDiv.innerHTML = `
        <div class="row">
          <div><label>Côté a :</label><input id="a" inputmode="decimal" placeholder="ex : 3"></div>
          <div><label>Côté b :</label><input id="b" inputmode="decimal" placeholder="ex : 4"></div>
          <div><label>Côté c :</label><input id="c" inputmode="decimal" placeholder="ex : 5"></div>
        </div>
        <p class="muted small">
          Héron : s = (a+b+c)/2 puis Aire = √(s(s-a)(s-b)(s-c)).
        </p>
      `;
    }
  }

  function formatNumber(x){
    if(!Number.isFinite(x)) return "NaN";
    const rounded = Math.round(x * 1000) / 1000;
    return String(rounded).replace(".", ",");
  }

  function calculerBaseHauteur(){
    const base = parseInput("base");
    const hauteur = parseInput("hauteur");

    if(!isFinitePositive(base) || !isFinitePositive(hauteur)){
      setMessage("Erreur : base et hauteur doivent être des nombres strictement positifs.", "error");
      return null;
    }

    const aire = (base * hauteur) / 2;

    const explication =
      "Formule utilisée : Aire = (base × hauteur) / 2. " +
      "Intuition : un triangle est la moitié d'un parallélogramme de même base et même hauteur.";

    const detail =
      `Données : base = ${formatNumber(base)}, hauteur = ${formatNumber(hauteur)}\n` +
      `Aire = (base × hauteur) / 2\n` +
      `Aire = (${formatNumber(base)} × ${formatNumber(hauteur)}) / 2\n` +
      `Aire = ${formatNumber(base * hauteur)} / 2\n` +
      `Aire = ${formatNumber(aire)}`;

    return { aire, explication, detail, draw: () => drawGeneralTriangleFromBaseHeight(base, hauteur) };
  }

  function resolveRightTriangle(a, b, c){
    const detailLines = [];
    let A = a, B = b, C = c;

    const hasA = isFinitePositive(A);
    const hasB = isFinitePositive(B);
    const hasC = isFinitePositive(C);

    const count = (hasA?1:0) + (hasB?1:0) + (hasC?1:0);
    if(count < 2){
      return { error: "Erreur : saisis au moins deux longueurs (dont idéalement a et b, ou bien une cathète et c)." };
    }

    // Cas 1 : a et b connus, on peut déduire c.
    if(hasA && hasB && !hasC){
      detailLines.push(`Pythagore : c² = a² + b²`);
      detailLines.push(`c² = ${formatNumber(A)}² + ${formatNumber(B)}²`);
      const c2 = A*A + B*B;
      C = Math.sqrt(c2);
      detailLines.push(`c² = ${formatNumber(c2)}`);
      detailLines.push(`c = √(${formatNumber(c2)}) = ${formatNumber(C)}`);
      return { a:A, b:B, c:C, detailLines };
    }

    // Cas 2 : a et c connus, b manquant.
    if(hasA && hasC && !hasB){
      if(C <= A){
        return { error: "Erreur : l'hypoténuse c doit être strictement plus grande que la cathète a." };
      }
      detailLines.push(`Pythagore : b² = c² - a²`);
      detailLines.push(`b² = ${formatNumber(C)}² - ${formatNumber(A)}²`);
      const b2 = C*C - A*A;
      if(b2 <= 0){
        return { error: "Erreur : c² - a² doit être positif." };
      }
      B = Math.sqrt(b2);
      detailLines.push(`b² = ${formatNumber(b2)}`);
      detailLines.push(`b = √(${formatNumber(b2)}) = ${formatNumber(B)}`);
      return { a:A, b:B, c:C, detailLines };
    }

    // Cas 3 : b et c connus, a manquant.
    if(hasB && hasC && !hasA){
      if(C <= B){
        return { error: "Erreur : l'hypoténuse c doit être strictement plus grande que la cathète b." };
      }
      detailLines.push(`Pythagore : a² = c² - b²`);
      detailLines.push(`a² = ${formatNumber(C)}² - ${formatNumber(B)}²`);
      const a2 = C*C - B*B;
      if(a2 <= 0){
        return { error: "Erreur : c² - b² doit être positif." };
      }
      A = Math.sqrt(a2);
      detailLines.push(`a² = ${formatNumber(a2)}`);
      detailLines.push(`a = √(${formatNumber(a2)}) = ${formatNumber(A)}`);
      return { a:A, b:B, c:C, detailLines };
    }

    // Cas 4 : les trois côtés donnés, vérifier triangle rectangle et cohérence.
    if(hasA && hasB && hasC){
      if(!triangleInequality(A,B,C)){
        return { error: "Erreur : ces longueurs ne respectent pas l'inégalité triangulaire, donc ne forment pas un triangle." };
      }

      // Hypoténuse = plus grand côté
      const sides = [{name:"a",v:A},{name:"b",v:B},{name:"c",v:C}].sort((x,y)=>x.v-y.v);
      const small1 = sides[0], small2 = sides[1], large = sides[2];

      detailLines.push(`Vérification rectangle : ${large.name} doit être l'hypoténuse (plus grand côté).`);
      detailLines.push(`Test : ${small1.name}² + ${small2.name}² = ${large.name}²`);

      const left = small1.v*small1.v + small2.v*small2.v;
      const right = large.v*large.v;

      detailLines.push(`${small1.name}² + ${small2.name}² = ${formatNumber(left)}`);
      detailLines.push(`${large.name}² = ${formatNumber(right)}`);

      // tolérance pour décimaux
      if(!almostEqual(left, right, 1e-7)){
        return { error: "Erreur : ces longueurs ne correspondent pas à un triangle rectangle (Pythagore non vérifié)." };
      }

      // Remettre dans l'ordre a,b,c avec c = hypoténuse
      let aR, bR, cR;
      cR = large.v;
      // Les deux autres sont les cathètes
      aR = small1.v;
      bR = small2.v;
      detailLines.push(`OK : triangle rectangle. Hypoténuse = ${formatNumber(cR)}.`);

      return { a:aR, b:bR, c:cR, detailLines };
    }

    return { error: "Erreur : combinaison de saisie non gérée." };
  }

  function calculerRectangle(){
    const a = parseInput("ra");
    const b = parseInput("rb");
    const c = parseInput("rc");

    const resolved = resolveRightTriangle(a,b,c);
    if(resolved.error){
      setMessage(resolved.error, "error");
      return null;
    }

    const A = resolved.a, B = resolved.b, C = resolved.c;
    const aire = (A * B) / 2;

    const explication =
      "Triangle rectangle : Aire = (a × b) / 2, où a et b sont les deux côtés perpendiculaires. " +
      "Si une longueur manque, on la calcule avec le théorème de Pythagore : a² + b² = c².";

    const detail =
      `Données (après résolution éventuelle) : a = ${formatNumber(A)}, b = ${formatNumber(B)}, c = ${formatNumber(C)}\n` +
      (resolved.detailLines.length ? (resolved.detailLines.join("\n") + "\n") : "") +
      `Aire = (a × b) / 2\n` +
      `Aire = (${formatNumber(A)} × ${formatNumber(B)}) / 2\n` +
      `Aire = ${formatNumber(A*B)} / 2\n` +
      `Aire = ${formatNumber(aire)}`;

    return { aire, explication, detail, draw: () => drawRightTriangle(A, B, C) };
  }

  function calculerHeron(){
    const a = parseInput("a");
    const b = parseInput("b");
    const c = parseInput("c");

    if(!isFinitePositive(a) || !isFinitePositive(b) || !isFinitePositive(c)){
      setMessage("Erreur : a, b et c doivent être des nombres strictement positifs.", "error");
      return null;
    }
    if(!triangleInequality(a,b,c)){
      setMessage("Erreur : ces longueurs ne respectent pas l'inégalité triangulaire (a+b>c, a+c>b, b+c>a).", "error");
      return null;
    }

    const s = (a + b + c) / 2;
    const radicand = s * (s - a) * (s - b) * (s - c);
    if(radicand <= 0){
      setMessage("Erreur : calcul impossible (le produit sous la racine doit être positif).", "error");
      return null;
    }
    const aire = Math.sqrt(radicand);

    const explication =
      "Formule de Héron : s = (a+b+c)/2 (demi-périmètre), puis Aire = √(s(s-a)(s-b)(s-c)). " +
      "Elle permet de calculer l'aire à partir des trois côtés uniquement.";

    const detail =
      `Données : a = ${formatNumber(a)}, b = ${formatNumber(b)}, c = ${formatNumber(c)}\n` +
      `Vérification : a+b>c, a+c>b, b+c>a (OK)\n` +
      `s = (a+b+c)/2\n` +
      `s = (${formatNumber(a)} + ${formatNumber(b)} + ${formatNumber(c)}) / 2\n` +
      `s = ${formatNumber(a+b+c)} / 2 = ${formatNumber(s)}\n` +
      `Aire = √(s(s-a)(s-b)(s-c))\n` +
      `Aire = √(${formatNumber(s)}(${formatNumber(s-a)})(${formatNumber(s-b)})(${formatNumber(s-c)}))\n` +
      `Aire = √(${formatNumber(radicand)})\n` +
      `Aire = ${formatNumber(aire)}`;

    return { aire, explication, detail, draw: () => drawTriangleFromSides(a,b,c) };
  }

  function calculer(){
    resetOutputs();

    const type = typeSelect.value;
    let out = null;

    if(type === "base") out = calculerBaseHauteur();
    if(type === "rectangle") out = calculerRectangle();
    if(type === "heron") out = calculerHeron();

    if(!out) return;

    setMessage("Calcul effectué.", "ok");
    resultatEl.textContent = `Aire = ${formatNumber(out.aire)} (unités²)`;
    explicationEl.textContent = out.explication;
    detailEl.textContent = out.detail;

    out.draw();
  }

  function drawAxes(){
    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 1;
    for(let x=0; x<=canvas.width; x+=50){
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x,canvas.height);
      ctx.stroke();
    }
    for(let y=0; y<=canvas.height; y+=50){
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(canvas.width,y);
      ctx.stroke();
    }
  }

  function drawRightTriangle(a,b,c){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();

    // Mise à l'échelle
    const padding = 60;
    const maxX = a;
    const maxY = b;
    const scaleX = (canvas.width - 2*padding) / maxX;
    const scaleY = (canvas.height - 2*padding) / maxY;
    const scale = Math.min(scaleX, scaleY);

    const x0 = padding;
    const y0 = canvas.height - padding;

    const A = {x:x0, y:y0};
    const B = {x:x0 + a*scale, y:y0};
    const C = {x:x0, y:y0 - b*scale};

    // Triangle
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(A.x,A.y);
    ctx.lineTo(B.x,B.y);
    ctx.lineTo(C.x,C.y);
    ctx.closePath();
    ctx.stroke();

    // Angle droit (petit carré)
    ctx.lineWidth = 2;
    const sq = 18;
    ctx.beginPath();
    ctx.moveTo(A.x, A.y);
    ctx.lineTo(A.x + sq, A.y);
    ctx.lineTo(A.x + sq, A.y - sq);
    ctx.lineTo(A.x, A.y - sq);
    ctx.stroke();

    // Labels
    ctx.fillStyle = "#111";
    ctx.font = "16px system-ui, Arial";
    ctx.fillText(`a = ${formatNumber(a)}`, (A.x+B.x)/2 - 20, A.y + 24);
    ctx.fillText(`b = ${formatNumber(b)}`, A.x - 52, (A.y+C.y)/2 + 6);
    ctx.fillText(`c = ${formatNumber(c)}`, (B.x+C.x)/2 + 10, (B.y+C.y)/2 - 10);
  }

  function drawGeneralTriangleFromBaseHeight(base, hauteur){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();

    const padding = 60;
    const scaleX = (canvas.width - 2*padding) / base;
    const scaleY = (canvas.height - 2*padding) / hauteur;
    const scale = Math.min(scaleX, scaleY);

    const x0 = padding;
    const y0 = canvas.height - padding;

    // Base horizontale
    const A = {x:x0, y:y0};
    const B = {x:x0 + base*scale, y:y0};

    // Sommet au-dessus de la base, à une position arbitraire mais stable
    const t = 0.35;
    const C = {x:x0 + base*scale*t, y:y0 - hauteur*scale};

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(A.x,A.y);
    ctx.lineTo(B.x,B.y);
    ctx.lineTo(C.x,C.y);
    ctx.closePath();
    ctx.stroke();

    // Hauteur (segment pointillé)
    const H = {x:C.x, y:y0};
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.moveTo(C.x,C.y);
    ctx.lineTo(H.x,H.y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#111";
    ctx.font = "16px system-ui, Arial";
    ctx.fillText(`base = ${formatNumber(base)}`, (A.x+B.x)/2 - 40, A.y + 24);
    ctx.fillText(`h = ${formatNumber(hauteur)}`, C.x + 10, (C.y+H.y)/2);
  }

  function drawTriangleFromSides(a,b,c){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();

    // Construction par coordonnées : placer A(0,0), B(c,0), trouver C via intersection de cercles
    // AB = c, AC = b, BC = a (choix arbitraire, juste pour dessiner)
    const AB = c;
    const AC = b;
    const BC = a;

    // Calcul de x_C via formule des triangles
    // x = (AC^2 - BC^2 + AB^2) / (2*AB)
    const x = (AC*AC - BC*BC + AB*AB) / (2*AB);
    const y2 = AC*AC - x*x;
    const y = y2 > 0 ? Math.sqrt(y2) : 0;

    const padding = 60;
    const maxX = Math.max(AB, x);
    const maxY = Math.max(y, 1e-6);
    const scaleX = (canvas.width - 2*padding) / maxX;
    const scaleY = (canvas.height - 2*padding) / maxY;
    const scale = Math.min(scaleX, scaleY);

    const x0 = padding;
    const y0 = canvas.height - padding;

    const A = {x:x0, y:y0};
    const Bp = {x:x0 + AB*scale, y:y0};
    const C = {x:x0 + x*scale, y:y0 - y*scale};

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(A.x,A.y);
    ctx.lineTo(Bp.x,Bp.y);
    ctx.lineTo(C.x,C.y);
    ctx.closePath();
    ctx.stroke();

    ctx.fillStyle = "#111";
    ctx.font = "16px system-ui, Arial";
    ctx.fillText(`AB = ${formatNumber(c)}`, (A.x+Bp.x)/2 - 35, A.y + 24);
    ctx.fillText(`AC = ${formatNumber(b)}`, (A.x+C.x)/2 - 35, (A.y+C.y)/2);
    ctx.fillText(`BC = ${formatNumber(a)}`, (Bp.x+C.x)/2 + 10, (Bp.y+C.y)/2);
  }

  btnCalc.addEventListener("click", calculer);
  btnReset.addEventListener("click", () => {
    // Efface les inputs
    const inputs = inputsDiv.querySelectorAll("input");
    inputs.forEach(i => i.value = "");
    resetOutputs();
    setMessage("Réinitialisé.", "muted");
  });

  typeSelect.addEventListener("change", afficherInputs);

  afficherInputs();
  drawPlaceholder();
</script>

</body>
</html>
